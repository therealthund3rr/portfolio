<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Nicolò Celentano — AI Engineer & Full Stack Developer</title>
    <meta
      name="description"
      content="Computer Engineering student in Turin building AI products and automation systems. Portfolio with interactive 3D, React, Three.js and GSAP."
    />
    <meta name="author" content="Nicolò Celentano" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://portfolio-gray-three-12.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio-gray-three-12.vercel.app/" />
    <meta property="og:title" content="Nicolò Celentano — AI Engineer & Full Stack Developer" />
    <meta
      property="og:description"
      content="Computer Engineering student in Turin building AI products and automation systems. Portfolio with interactive 3D, React, Three.js and GSAP."
    />
    <meta property="og:image" content="https://portfolio-gray-three-12.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nicolò Celentano — AI Engineer & Full Stack Developer" />
    <meta
      name="twitter:description"
      content="Computer Engineering student in Turin building AI products and automation systems."
    />
    <meta name="twitter:image" content="https://portfolio-gray-three-12.vercel.app/og-image.png" />

    <!-- Performance: start fetching the 3D model and environment map early -->
    <link rel="preload" href="/character.glb" as="fetch" type="model/gltf-binary" crossorigin />
    <link rel="preload" href="/char_enviorment.hdr" as="fetch" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Nicolò Celentano",
        "jobTitle": "AI Engineer & Full Stack Developer",
        "description": "Computer Engineering student building AI products and automation systems",
        "url": "https://portfolio-gray-three-12.vercel.app/",
        "address": { "@type": "PostalAddress", "addressLocality": "Turin", "addressCountry": "IT" },
        "alumniOf": { "@type": "CollegeOrUniversity", "name": "Politecnico di Torino" },
        "sameAs": [
          "https://github.com/therealthund3rr",
          "https://www.linkedin.com/in/nicol%C3%B2-celentano-7677413a4/"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
