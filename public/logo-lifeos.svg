      <stop offset="0%"   stop-color="#091928"/>
      <stop offset="50%"  stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="342" fill="none" stroke="url(#grad)" stroke-width="80"/>
